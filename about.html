<body>
 
  <div class="video">

<div class="yohaku"></div>
 
<div class="title">
 <div class="rogo"><img src="https://blue-ttt.github.io/plot/data/plot%E3%83%AD%E3%82%B3%E3%82%99.png"></div>
<div class="name"><h1>plot</h1></div>
 <br>
 <p>小さな思いつきを大きな創造へ発展するソフト</p>
</div>
<div class="yohaku2"></div>
 
 <div class="honbun"><!--ここから本文-->
  <p>登録など不要です</p>
  <div class="material-symbols-outlined">
  <div><a href="index.html" class="startbutton"><span class="material-symbols-outlined">new_window</span>今すぐプロット！</a></div>

  <div><a class="aboutbutton move-animation"><span class="material-symbols-outlined">lightbulb_2</span>使い方(初めての方はこちら)</a></div>
 </div>
</div>

  
 <style>
  body{
   font-family:"potta-one-regular";
  }
  .yohaku{
   margin:250px;
  }
  .yohaku2{
   margin:500px;
  }
  .name{
   font-size:50px;
   color:#FCAF17;
  }
  .rogo img{
   display:inline-block;
   width:100px;
  }
  .video{
   position:fixed;
   z-index:-100;
   width:100%;
  }
  .title{
    text-align: center;
    background-color:#fff;
  }
  .honbun{
    text-align: center; /* 中央揃えにする */
    background-color:#fff;
  }
  
  .startbutton{
   display: inline-block;
   color:#fff;
   background-color:#FCAF17;
   width:100%;
   padding:20px;
   text-decoration:none;
   border-radius:30px;
   margin:5px;
   font-size:30px;
   box-shadow:1px 1px 5px 2px #a38103;
  }
  
  .aboutbutton{
   display: inline-block;
   color:#fff;
   background-color:#FFD400;
   width:100%;
   padding:20px;
   text-decoration:none;
   border-radius:30px;
   margin:5px;
  }
  
  /* 1. ふわふわ動くアニメーションの中身を定義 */
@keyframes softFloat {
  0% {
    transform: translateY(0);       /* 元の位置 */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 普通の影 */
  }
  50% {
    transform: translateY(-8px);    /* 8px上に浮かぶ */
    box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15); /* 浮いたので影を大きく・薄く */
  }
  100% {
    transform: translateY(0);       /* 元の位置に戻る */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }
}

/* 2. 動かしたいボタンに適用するクラス */
.move-animation {
  animation: softFloat 3s ease-in-out infinite; /* 3秒かけて、滑らかに、無限に繰り返す */
}
  
  .startbutton:hover{
   transition:all 0.3s ease;/* 滑らかに動くようにする */
   color:#fff;
   background-color:#fcd238;
   box-shadow:1px 5px 10px 2px #a38103; /* 影 */
   transform:translateY(-4px);
  }
  
 </style>
 
</body>
