 <style>
  .yohaku{
   margin:250px;
  }
  .yohaku2{
   margin:500px;
  }
  .rogo img{
   display:inline-block;
   width:200px;
   box-shadow:0px 2px 2px 2px #7d7d7d;
  }
  .video{
   position:fixed;
   z-index:-100;
   width:100%;
  }
  .title{
    text-align: center;
    background-color:#fff;
  }
  .honbun{
    text-align: center; /* 中央揃えにする */
    background-color:#fff;
  }
  
  .startbutton{
   display: inline-block;
   color:#fff;
   background-color:#FCAF17;
   width:100%;
   padding:20px;
   text-decoration:none;
   border-radius:30px;
   margin:5px;
   font-size:30px;
   box-shadow:1px 1px 5px 2px #a38103;
  }
  
  .aboutbutton{
   display: inline-block;
   color:#fff;
   background-color:#FFD400;
   width:100%;
   padding:20px;
   text-decoration:none;
   border-radius:30px;
   margin:5px;
  }
  
  /* 動くアニメーションの中身を定義 */
 @keyframes softFloat {
  0% {
    transform:scale(1);     
    box-shadow:0px 0px 5px 2px #FFD400; /* 普通 */
  }
  50% {
    transform:scale(1.1);    /* 変化 */
    box-shadow:0px 0px 10px 2px #FFD400; 
   }
  100% {
    transform:scale(1);       /* 普通 */
    box-shadow:0px 0px 5px 2px #FFD400;
   }
 }

  /* 動くボタンのスタイル */
  .move-animation {
   animation: softFloat 3s ease-in-out infinite; /* 3秒かけて、滑らかに、無限に繰り返す */
   }
  
  .startbutton:hover{
   transition:all 0.3s ease;/* 滑らかに動くようにする */
   color:#fff;
   background-color:#fcd238;
   box-shadow:1px 5px 10px 2px #a38103; /* 影 */
   transform:translateY(-4px);
  }
  
 </style>
