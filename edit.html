<head><title>編集 plotコンテンツ</title><link rel="stylesheet" href="program/style.css"><meta chareset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /></head>

<body>
 <header>
  <ul>
   <li><p>[題名のjsプログラム]</p></li>
   <li><button data-tooltip="ホーム"><span class="material-symbols-outlined">home</span></button></li>
   <li><button data-tooltip="ファイル"><span class="material-symbols-outlined">folder</span></button></li>
   <li><button data-tooltip="設定"><span class="material-symbols-outlined">settings</span></button></li>
   <li><button data-tooltip="ヘルプ"><span class="material-symbols-outlined">help</span></button></li>
   <li><button class="new"><span class="material-symbols-outlined">update</span>同期</button></li>
   <li><button class="share"><span class="material-symbols-outlined">share</span>共有</button></li>
  </ul>
 </header>
 <div class="ai-btn"><button data-toolip=AI分析></button></div>
  
 <style>
  body{background-color:#fff; margin:0;}
  ul{ display:flex; flex-direction:row; list-style:none; }
  header{ background-color:#FCAF17; width:100%; height:50px; }
  .new{ font-size:20px; padding:5px; margin:10px; width:80px; border-radius:10px; }
  .share{ font-size:20px; padding:5px; margin:10px; width:80px; border-radius:10px; }
  
  button{position: relative;}
  button[data-tooltip]::after{content: attr(data-tooltip); /* data-tooltipの内容を表示 */ position: absolute; visibility: hidden; color:#fff; background-color:#000; top: 110%; left: 0%; white-space:nowrap; transition: opacity 0.5s; }
  button[data-tooltip]:hover::after { opacity: 1; visibility: visible; }
  .ai-btn{ color:#fff; background-color:#FCAF17; border-radius:30px; aspect-ratio:1/1; marigin:5px; padding:10px; width:20px;}

  }
  </style>
