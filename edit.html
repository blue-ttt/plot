<head><title>編集 plotコンテンツ</title><link rel="stylesheet" href="program/style.css"><meta chareset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /></head>

<body>
 <header>
  <ul>
   <li><p>[題名のjsプログラム]</p></li>
   <li><button class="home-btn" data-tooltip="ホーム"><span class="material-symbols-outlined">home</span></button></li>
   <li><button data-tooltip="ファイル"><span class="material-symbols-outlined">folder</span></button></li>
   <li><button data-tooltip="設定"><span class="material-symbols-outlined">settings</span></button></li>
   <li><button class="help-btn" data-tooltip="ヘルプ"><span class="material-symbols-outlined">help</span></button></li>
   <li><button class="new"><span class="material-symbols-outlined">update</span>同期</button></li>
   <li><button class="share"><span class="material-symbols-outlined">share</span>共有</button></li>
  </ul>
 </header>
 <div class="ai-btn"><button data-tooltip="AI分析"><span class="material-symbols-outlined">smart_toy</span></button></div>
 
 <div class="mini-study">
  <button class="mini-study-close" data-tooltip="閉じる"><span class="material-symbols-outlined">close</span></button>
  <iframe src="https://blue-ttt.github.io/plot/study/index" width="800px" height="100%"></iframe>
 </div>
 
 <script>
  document.querySelector(".home-btn").addEventListener('click', function() { window.open("https://blue-ttt.github.io/plot/index.html", "_blank"); }); 
  document.querySelector(".help-btn").addEventListener('click', function() {const target = document.querySelector(".mini-study"); target.style.display = "block";}); /* ？ボタンが押されたらhelpを表示 */
  document.querySelector(".mini-study-close").addEventListener('click', function() {const target = document.querySelector(".mini-study"); target.style.display = "none";}); /* ×ボタンが押されたらhelpを非表示 */

  const target = document.querySelector(".mini-study");  //最初にhelpを非表示
  target.style.display = "none";
  
 </script>
 
 <style>
  body{background-color:#fff; margin:0;}
  ul{ display:flex; flex-direction:row; list-style:none; }
  header{ background-color:#FCAF17; width:100%; height:50px; }
  .new{ font-size:20px; padding:5px; margin:10px; width:80px; border-radius:10px; }
  .share{ font-size:20px; padding:5px; margin:10px; width:80px; border-radius:10px; }
  
  .mini-study{ background-color:#fff; z-index:50; width:900px; height:100%; box-shadow:0px 0px 10px 1px #000; text-align:center; margin:auto; }
  .mini-study-close{ top:0px; }
  
  button{position: relative;}
  button[data-tooltip]::after{content: attr(data-tooltip); /* data-tooltipの内容を表示 */ position: absolute; visibility: hidden; color:#fff; background-color:#000; top: 110%; left: 0%; white-space:nowrap; transition: opacity 0.5s; }
  button[data-tooltip]:hover::after { opacity: 1; visibility: visible; }
  .ai-btn button{ color:#fff; background-color:#FCAF17; border-radius:30px; aspect-ratio:1/1; marigin:5px; padding:10px; width:50px;}
  @media(max-width:768px){  }
  </style>
</body>
