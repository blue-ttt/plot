<head>
 <title>編集 plotコンテンツ</title>
 <link rel="stylesheet" href="program/style.css">
 <meta chareset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
 <header>
  <ul>
   <li><p>[題名のjsプログラム]</p></li>
   <li><button class="home-btn" data-tooltip="ホーム"><span class="material-symbols-outlined">home</span></button></li>
   <li><button data-tooltip="ファイル"><span class="material-symbols-outlined">folder</span></button></li>
   <li><button class="set-btn" data-tooltip="設定"><span class="material-symbols-outlined">settings</span></button></li>
   <li><button class="help-btn" data-tooltip="ヘルプ"><span class="material-symbols-outlined">help</span></button></li>
   <li><button class="new" data-tooltip="サーバーへ変更を反映させる"><span class="material-symbols-outlined">update</span>同期</button></li>
   <li><button class="share" data-tooltip="アイデアを共有する"><span class="material-symbols-outlined">share</span>共有</button></li>
  </ul>
 </header>
 <div class="ai-btn"><button data-tooltip="AI分析"><span class="material-symbols-outlined">smart_toy</span></button></div>
 
 <div class="mini-study">
  <button class="mini-study-close" data-tooltip="閉じる"><span class="material-symbols-outlined">close</span></button>
  <iframe src="https://blue-ttt.github.io/plot/study/index" width="800px" height="100%"></iframe>
 </div>
 <div class="mini-setting">
  <button class="mini-setting-close" data-tooltip="閉じる"><span class="material-symbols-outlined">close</span></button>
  <iframe src="https://blue-ttt.github.io/plot/setting.html" width="800px" height="100%"></iframe>
 </div>

 <div class="toolbar">
  <ul>
   <li><button class="tools" data-tooltip="操作する"><span class="material-symbols-outlined">arrow_selector_tool</span></button></li>
   <li><button class="tools"data-tooltip="筆記用具で描く"><span class="material-symbols-outlined">ink_pen</span></button></li>
   <li><button class="tools"data-tooltip="消しゴムで消す"><span class="material-symbols-outlined">ink_eraser</span></button></li>
   <li><button class="tools"data-tooltip="付箋を追加"><span class="material-symbols-outlined">note_stack</span></button></li>
   <li><button class="tools"data-tooltip="ピンを追加"><span class="material-symbols-outlined">add_location</span></button></li>
   <li><button class="tools"data-tooltip="素材を追加"><span class="material-symbols-outlined">shapes</span></button></li>
   <li><button class="tools"data-tooltip="テキストを追加"><span class="material-symbols-outlined">insert_text</span></button></li>
   <li><button class="tools"data-tooltip="グラフを追加"><span class="material-symbols-outlined">add_chart</span></button></li>
   <li><button class="tools"data-tooltip="ファイルをアップロード"><span class="material-symbols-outlined">upload</span></button></li>
  </ul>
 </div>


  <div id="viewport" class="viewport">
   <div id="canvas" class="canvas">
       <div style="position:absolute; top:500px; left:500px;">中心の目印</div>
   </div>
  </div>
 
 <script>
   /* header */ 
  document.querySelector(".home-btn").addEventListener('click', function() { window.open("https://blue-ttt.github.io/plot/index.html", "_blank"); }); /* ホームへ移動 */
  
  document.querySelector(".help-btn").addEventListener('click', function() {const target = document.querySelector(".mini-study"); target.style.display = "block";}); /* ？ボタンが押されたらhelpを表示 */
  document.querySelector(".mini-study-close").addEventListener('click', function() {const target = document.querySelector(".mini-study"); target.style.display = "none";}); /* ×ボタンが押されたらhelpを非表示 */
  
  document.querySelector(".set-btn").addEventListener('click', function() {const target = document.querySelector(".mini-setting"); target.style.display = "block";}); /* ？ボタンが押されたらsettingを表示 */
  document.querySelector(".mini-setting-close").addEventListener('click', function() {const target = document.querySelector(".mini-setting"); target.style.display = "none";}); /* ×ボタンが押されたらsettingを非表示 */

   /* tool */ 
  const toolButtons = document.querySelectorAll('.toolbar button'); /* toolbarのボタンを取得 */ 

  toolButtons.forEach(button => {
  button.addEventListener('click', function() {
   toolButtons.forEach(btn => btn.classList.remove('active')); /* リセット（他のボタンには色がついているから） */ 
   this.classList.add('active'); /* activeを実行 */
    });
  });

  /* canvas */
  
let scale = 1.0; 
let posX = 0;    
let posY = 0;    
const zoomSpeed = 0.01; // ズームの速さ

const content = document.getElementById("canvas"); // あなたのHTMLのid="canvas"
const Keys = {};

/* キーボードの設定（1回だけ設定） */
window.addEventListener("keydown", (e) => {
  Keys[e.key] = true;
  // 矢印キーで画面がスクロールするのを防ぐ
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
});

window.addEventListener("keyup", (e) => {
  Keys[e.key] = false;
});

/* ズームの設定（1回だけ設定） */
window.addEventListener('wheel', (e) => {
  e.preventDefault(); // ページ全体のズームを防止

  if (e.deltaY < 0) {
    scale += zoomSpeed * 5; // 拡大
  } else {
    scale -= zoomSpeed * 5; // 縮小
  }

  // 小さくなりすぎ・大きくなりすぎを防止 (下限:0.1倍 上限:5倍)
  scale = Math.min(Math.max(0.1, scale), 5);
  
  update(); // ズームした時に見た目を更新
}, { passive: false });


/* 画面を更新する関数 */
function update() {
  if (content) {
    content.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }
}

/* 常に動き続けるループ*/
function loop() {
  // 矢印キーでの移動（右キーで中身を左へ動かすと、右が見える）
  if (Keys["ArrowRight"]) { posX -= 10; } 
  if (Keys["ArrowLeft"])  { posX += 10; }
  if (Keys["ArrowUp"])    { posY += 10; }
  if (Keys["ArrowDown"])  { posY -= 10; }

  update(); // 座標が変わったので見た目を更新
  requestAnimationFrame(loop); // 次の画面書き換えを予約
}

/* もう一度ループ */
loop();

  
 </script>
 
 <style>
  body{background-color:#fff; margin:0; display: grid; grid-template-rows: 50px 1fr; }
  header ul{ display:flex; flex-direction:row; list-style:none; width:100%; align-items:center; margin-top:0px; position:fixed; top:0; }
  header{ background-color:#FCAF17; width:100%; height:50px; align-items:center; position:fixed; z-index:100; }
  .new{ font-size:20px; padding:5px; margin-left:10px; width:90px; height:45px; border-radius:10px; right:-850px; }
  .share{ font-size:20px; padding:5px; margin-left:10px; width:90px; height:45px; border-radius:10px; right:-900px; }
  
  .toolbar{ margin:0; padding:0; width:45px; height:500px; background-color:#FFF9E6; position:fixed; top:100px; left:15px; border-radius:20px; box-shadow:1px 1px 5px 1px #8A8C8E;}
  .toolbar ul{ margin:0; display:flex; flex-direction:column; list-style:none; padding: 0; }
  .toolbar button{ background-color:#fff; color:#000; }
  .toolbar button.active{ background-color:#FCAF17; color:#fff; }
  .tools{ margin-top:10px; border-radius:30px; aspect-ratio:1/1; }

  .canvas{ width:3000px; height:3000px; transform-origin:0 0;  }
  .viewport{ width:100vw; height:100vh; overflow: hidden; /* はみ出た部分は隠す（スクロールバーを出さない） */ }
  
  
  .mini-study{ display: none; background-color:#fff; z-index:50; width:900px; height:650px; box-shadow:0px 0px 10px 1px #8A8C8E; text-align:center; margin:auto; }
  .mini-study-close{ top:-600px; }
  .mini-setting{ display: none; background-color:#fff; z-index:50; width:900px; height:650px; box-shadow:0px 0px 10px 1px #8A8C8E; text-align:center; margin:auto; }
  .mini-setting-close{ top:-600px; }
  
  .ai-btn button{ color:#fff; background-color:#FCAF17; border-radius:30px; aspect-ratio:1/1; marigin:5px; padding:10px; width:50px; bottom: 20px;/* 下から20pxの位置 */ right: 20px;/* 右から20pxの位置 */ position: fixed;/* 画面に固定 */ }
  
  @media(max-width:768px){  }
  </style>
</body>
